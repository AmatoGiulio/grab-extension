<!doctype html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Geist'; font-weight:400; src:url('../../../node_modules/@fontsource/geist/files/geist-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family:'Geist'; font-weight:600; src:url('../../../node_modules/@fontsource/geist/files/geist-latin-600-normal.woff2') format('woff2'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:440px; height:280px; overflow:hidden; }
body {
  font-family:'Geist',sans-serif;
  background:
    radial-gradient(360px 260px at 85% 15%, rgba(26,115,232,0.16), transparent 60%),
    linear-gradient(155deg, #0d0d10, #14141a);
  position:relative;
}
body::before { content:''; position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size:20px 20px; }
.text { position:absolute; left:30px; top:50%; transform:translateY(-50%); width:210px; z-index:2; }
.brand { display:flex; align-items:center; gap:9px; margin-bottom:16px; }
.brand img { width:26px; height:26px; filter:brightness(0) invert(1); }
.brand span { font-size:19px; font-weight:600; color:#f2f2f5; }
h1 { font-size:27px; font-weight:600; color:#f5f5f7; line-height:1.15; letter-spacing:-0.02em; }
h1 em { font-style:normal; color:#6aa5f8; }
.shot { position:absolute; right:-52px; top:22px; transform:rotate(-4deg); z-index:1; }
.shot img { height:340px; border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 24px 60px rgba(0,0,0,0.6), 0 0 80px rgba(26,115,232,0.10); }
</style></head><body>
<div class="text">
  <div class="brand"><img src="../../../public/icons/icon-light-128.png"><span>Grab</span></div>
  <h1>Every image.<br><em>One panel.</em></h1>
</div>
<div class="shot"><img src="panel-grid.png"></div>
</body></html>
