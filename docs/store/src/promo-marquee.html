<!doctype html><html><head><meta charset="utf-8"><style>
@font-face { font-family:'Geist'; font-weight:400; src:url('../../../node_modules/@fontsource/geist/files/geist-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family:'Geist'; font-weight:600; src:url('../../../node_modules/@fontsource/geist/files/geist-latin-600-normal.woff2') format('woff2'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1400px; height:560px; overflow:hidden; }
body {
  font-family:'Geist',sans-serif;
  background:
    radial-gradient(900px 500px at 75% 20%, rgba(26,115,232,0.12), transparent 60%),
    linear-gradient(160deg, #0d0d10, #121218 60%, #0b0b0e);
  display:flex; align-items:center; padding:0 90px; gap:80px; position:relative;
}
body::before { content:''; position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.028) 1px, transparent 1px); background-size:26px 26px; }
.text { position:relative; width:560px; flex:none; }
.brand { display:flex; align-items:center; gap:14px; margin-bottom:30px; }
.brand img { width:40px; height:40px; filter:brightness(0) invert(1); }
.brand span { font-size:28px; font-weight:600; color:#f2f2f5; }
h1 { font-size:54px; font-weight:600; color:#f5f5f7; line-height:1.1; letter-spacing:-0.025em; margin-bottom:20px; }
h1 em { font-style:normal; color:#6aa5f8; }
p { font-size:21px; color:#9b9ba4; line-height:1.5; }
.shot { position:relative; flex:1; display:flex; justify-content:flex-end; align-items:flex-start; height:100%; }
.shot img { height:640px; margin-top:70px; border-radius:16px;
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:0 40px 90px rgba(0,0,0,0.55), 0 0 120px rgba(26,115,232,0.07); }
</style></head><body>
<div class="text">
  <div class="brand"><img src="../../../public/icons/icon-light-128.png"><span>Grab</span></div>
  <h1>Every image on the page. <em>One panel.</em></h1>
  <p>Scan, filter, preview and download — one by one or as an organized ZIP.</p>
</div>
<div class="shot"><img src="panel-grid.png"></div>
</body></html>
